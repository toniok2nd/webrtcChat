<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>💙👽 Alien WebRTC Fiesta – Beam Up!</title>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h1><i class="fas fa-robot" style="color:#00bcd4;"></i> Alien WebRTC Fiesta <i class="fas fa-robot" style="color:#00bcd4;"></i></h1>
  <p class="tagline">Enter the cosmic lounge – video chat across the galaxy.</p>

  <div id="room-selection">
    <input id="room-input" type="text" placeholder="🌐 Enter a room name..." />
    <button id="join-btn" class="green-btn"><i class="fas fa-play"></i> Beam me up</button>
  </div>

  <div id="video-container" style="display:none;">
    <video id="localVideo" autoplay muted playsinline></video>
    <div id="remoteContainer"></div>
    <p>Room: <span id="room-label"></span></p>
    <button id="leave-btn" class="green-btn"><i class="fas fa-door-open"></i> Exit base</button>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"
          integrity="sha384-mZLF4UVrpi/QTWPA7BjNPEnkIfRFn4ZEO3Qt/HFklTJBj/gBOV8G3HcKn4NfQblz"
          crossorigin="anonymous"></script>

  <script>
    window.ICE_CONFIG = {
      iceServers: [
        { urls: "{{ STUN_URL }}" },
        {
          urls: "{{ TURN_URL }}",
          username: "{{ TURN_USER }}",
          credential: "{{ TURN_PASS }}"
        }
      ]
    };
  </script>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
